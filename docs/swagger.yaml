host: localhost:8888
info:
  contact:
    email: walter.fan@gmail.com
    name: API Support
  description: |-
    API documentation for Lazy AI Coder - GitLab integration, LLM tools, and MCP server

    Features:
    - LLM chat and code analysis
    - GitLab integration (read files, review MRs)
    - MCP (Model Context Protocol) server
    - PlantUML diagram generation
    - Session management with memory
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Lazy AI Coder API
  version: "1.0"
paths:
  /api/v1/admin/pending-users:
    get:
      consumes:
      - application/json
      description: Get all users pending admin approval (super_admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.UserListResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
