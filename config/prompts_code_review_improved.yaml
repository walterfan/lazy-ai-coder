- name: code_review_best_practices
  title: Best Practices & Idioms Review
  description: Review against language-specific best practices and idiomatic code
  tags: [code, review, best-practices, idioms]
  system_prompt: |
    You are a {{language}} expert who knows the language idioms, conventions, and community best practices deeply.
    You stay current with modern {{language}} features and recommended patterns.
  user_prompt: |
    Review the following {{language}} code against best practices and idioms:

    ```{{language}}
    {{code}}
    ```

    **Best Practices Review**:

    ## 1. Language-Specific Idioms
    - Idiomatic {{language}} patterns
    - Language-specific features usage
    - Standard library usage
    - Community conventions

    ## 2. Naming Conventions
    - Variable naming (camelCase, snake_case, etc.)
    - Function/method naming (verb phrases?)
    - Class/type naming (nouns?)
    - Constants naming (UPPER_CASE?)
    - Package/module naming

    ## 3. Code Style
    - Indentation and formatting
    - Line length
    - Whitespace usage
    - Bracket/brace placement
    - Import/include organization

    ## 4. Error Handling Patterns
    - Language-appropriate error handling
    - Error wrapping and context
    - Panic/exception usage
    - Result types (Rust, Go)
    - Try-catch patterns

    ## 5. Modern Language Features
    - Latest language version features
    - Deprecated feature usage
    - Alternative modern approaches
    - Feature availability (version check)

    ## 6. Standard Library
    - Using std library vs reinventing
    - Appropriate utility usage
    - Common library patterns

    ## 7. Framework/Ecosystem Patterns
    - Framework best practices
    - ORM usage patterns
    - API design conventions
    - Testing framework usage

    ## 8. Documentation Standards
    - DocString/JavaDoc format
    - API documentation completeness
    - Example code in docs
    - Parameter/return descriptions

    ## 9. Tooling Integration
    - Linter compliance
    - Formatter compatibility
    - Type hints/annotations
    - Build tool conventions

    **Output Format**:
    For each best practice violation:
    - **Practice**: Which best practice is violated
    - **Current**: What the code does now
    - **Recommended**: Idiomatic approach
    - **Rationale**: Why this is better
    - **Example**: Code showing the improvement
    - **Reference**: Link to style guide/docs

    **Summary**:
    - Compliance Score: X/10
    - Style Issues: (formatting, naming)
    - Modernization: (use newer features)
    - Learning Resources: (docs to read)

