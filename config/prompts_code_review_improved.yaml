# REFACTORING REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_refactoring
  title: Refactoring Suggestions Review
  description: Identify refactoring opportunities and technical debt
  tags: [code, review, refactoring, technical-debt]
  system_prompt: |
    You are a refactoring expert who can identify code smells, technical debt, and improvement opportunities.
    You know {{language}} refactoring patterns and when to apply them.
  user_prompt: |
    Analyze the following {{language}} code for refactoring opportunities:

    ```{{language}}
    {{code}}
    ```

    **Refactoring Analysis**:

    ## 1. Code Smells Identification
    - Long methods (>20-30 lines)
    - Large classes (too many responsibilities)
    - Duplicated code
    - Feature envy
    - Data clumps
    - Primitive obsession
    - Switch statements (polymorphism opportunity?)
    - Speculative generality
    - Temporary fields

    ## 2. Refactoring Catalog
    For each smell, suggest:
    - **Extract Method**: Break down long methods
    - **Extract Class**: Separate responsibilities
    - **Move Method/Field**: Better placement
    - **Rename**: Clearer names
    - **Replace Temp with Query**: Remove temporary variables
    - **Replace Conditional with Polymorphism**
    - **Introduce Parameter Object**: Group parameters
    - **Preserve Whole Object**: Pass object instead of fields
    - **Replace Magic Number with Symbolic Constant**

    ## 3. Design Pattern Opportunities
    - Strategy pattern (for algorithm variations)
    - Factory pattern (for object creation)
    - Observer pattern (for event handling)
    - Decorator pattern (for extending behavior)
    - Template method (for algorithm structure)
    - State pattern (for state-dependent behavior)

    ## 4. Simplification Opportunities
    - Simplify conditionals
    - Consolidate duplicate conditionals
    - Remove dead code
    - Simplify boolean expressions
    - Replace nested conditionals with guard clauses
    - Decompose complex conditions

    ## 5. Data Structure Improvements
    - Better data structure selection
    - Encapsulate collections
    - Replace array with object
    - Change value to reference (or vice versa)

    ## 6. Object-Oriented Improvements
    - Encapsulate fields
    - Remove setters (prefer immutability)
    - Replace inheritance with delegation
    - Replace delegation with inheritance (where appropriate)

    ## 7. Function/Method Improvements
    - Reduce parameter lists
    - Separate query from modifier
    - Parameterize method
    - Replace parameter with explicit methods
    - Introduce named parameters

    ## 8. Technical Debt Assessment
    - Estimated effort to refactor
    - Risk level of refactoring
    - Priority (high/medium/low)
    - Dependencies affected

    **Output Format**:
    For each refactoring opportunity:
    - **Code Smell**: Type of problem
    - **Location**: Where in code
    - **Impact**: How it affects maintainability
    - **Refactoring**: Specific refactoring technique
    - **Before**: Current problematic code
    - **After**: Refactored version
    - **Effort**: Time/complexity estimate
    - **Priority**: HIGH/MEDIUM/LOW
    - **Testing**: How to verify refactoring didn't break anything

    **Summary**:
    - Technical Debt Score: X/10
    - High Priority Refactorings: (do these first)
    - Quick Wins: (easy improvements with high impact)
    - Long-term Improvements: (architectural changes)
    - Estimated Total Effort: (story points/hours)

