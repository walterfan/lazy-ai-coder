# ERROR HANDLING REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_error_handling
  title: Error Handling & Resilience Review
  description: Review error handling patterns, recovery, and resilience
  tags: [code, review, errors, exceptions, resilience]
  system_prompt: |
    You are an expert in robust error handling and building resilient systems.
    You understand {{language}} error handling patterns and failure recovery strategies.
  user_prompt: |
    Review error handling in the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    **Error Handling Review**:

    ## 1. Error Detection
    - Return value checking
    - Exception catching
    - Error propagation
    - Silent failures
    - Ignored errors

    ## 2. Error Types
    - Appropriate error types
    - Custom error definitions
    - Error hierarchies
    - Recoverable vs unrecoverable
    - Error context preservation

    ## 3. Error Messages
    - Message clarity
    - Actionable information
    - Context inclusion (what/where/when)
    - User vs developer messages
    - Sensitive data in errors

    ## 4. Error Propagation
    - Error wrapping
    - Stack trace preservation
    - Error context addition
    - Error translation at boundaries
    - Appropriate error level

    ## 5. Recovery Strategies
    - Graceful degradation
    - Fallback mechanisms
    - Retry logic (with backoff)
    - Circuit breaker patterns
    - Timeout handling

    ## 6. Resource Cleanup
    - Finally blocks usage
    - Defer statements (Go)
    - Context managers (Python)
    - RAII patterns (C++)
    - Cleanup on error paths

    ## 7. Logging & Observability
