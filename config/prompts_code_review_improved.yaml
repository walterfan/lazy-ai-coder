# ----------------------------------------------------------------------------
# CONCURRENCY & THREAD SAFETY REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_concurrency
  title: Concurrency & Thread Safety Review
  description: Review concurrent code for race conditions, deadlocks, and thread safety
  tags: [code, review, concurrency, threading, safety]
  system_prompt: |
    You are a concurrency expert who understands multi-threading, async programming, and synchronization.
    You know {{language}} concurrency primitives and common concurrency bugs.
  user_prompt: |
    Review the following {{language}} code for concurrency issues:

    ```{{language}}
    {{code}}
    ```

    **Concurrency Review**:

    ## 1. Race Conditions
    - Shared mutable state access
    - Non-atomic operations on shared data
    - Check-then-act patterns
    - Read-modify-write issues
    - Missing synchronization

    ## 2. Deadlocks
    - Lock ordering issues
    - Circular wait conditions
    - Nested lock acquisition
    - Timeout mechanisms

    ## 3. Thread Safety
    - Thread-safe data structures
    - Immutability usage
    - Lock-free algorithms
    - Volatile/atomic variables
    - Safe publication

    ## 4. Synchronization
    - Lock granularity (too coarse/fine?)
    - Appropriate lock types (mutex, rwlock, etc.)
    - Lock contention
    - Critical section size
    - Spin locks vs blocking locks

    ## 5. Async/Await Patterns
    - Proper async usage
    - Await placement
    - Async function coloring
    - Blocking in async context
    - Promise/Future handling

    ## 6. Resource Leaks
    - Goroutine leaks (Go)
    - Thread pool exhaustion
    - Connection pool leaks
    - Unreleased resources
    - Proper cleanup

    ## 7. State Management
    - Thread-local storage
    - Shared state minimization
    - Immutable data structures
    - Message passing vs shared memory

    ## 8. Concurrency Primitives
    - Channels usage (Go)
    - Promises/Futures
    - Semaphores
    - Barriers
    - Atomic operations

    ## 9. Performance
    - Lock contention hotspots
    - False sharing
    - Context switching overhead
    - Parallelism degree

    **Output Format**:
    For each concurrency issue:
    - **Issue**: Concurrency bug or problem
    - **Severity**: CRITICAL/HIGH/MEDIUM/LOW
    - **Scenario**: How/when it manifests
    - **Impact**: Race condition outcome
    - **Fix**: Thread-safe implementation
    - **Testing**: How to test concurrency

    **Summary**:
    - Thread Safety Score: X/10
    - Critical Issues: (race conditions, deadlocks)
    - Recommendations: (synchronization strategy)

