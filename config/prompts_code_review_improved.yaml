# ============================================================================
# Code Review Prompts - Comprehensive Collection
# Organized by review focus area with consistent naming and structure
# ============================================================================

# ----------------------------------------------------------------------------
# COMPREHENSIVE REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_comprehensive
  title: Comprehensive Code Review
  description: Multi-dimensional comprehensive code review covering all aspects
  tags: [code, review, comprehensive, quality, security]
  system_prompt: |
    You are a principal software engineer with 15+ years of experience conducting thorough code reviews.
    You have deep expertise in {{language}} and understand security, performance, maintainability, and best practices.
    Provide constructive, actionable feedback with specific code examples.
  user_prompt: |
    Perform a comprehensive code review of the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    Review across these dimensions:

    ## 1. Functionality & Correctness
    - Logic errors and algorithmic correctness
    - Edge cases and boundary conditions
    - Null/undefined/error handling
    - Data validation and sanitization

    ## 2. Security Vulnerabilities
    - Input validation (injection attacks: SQL, XSS, command injection)
    - Authentication and authorization flaws
    - Sensitive data exposure (secrets, PII)
    - Cryptographic weaknesses
    - Dependency vulnerabilities
    - Rate severity: CRITICAL/HIGH/MEDIUM/LOW

    ## 3. Performance & Scalability
    - Time complexity: O(?) analysis
    - Space complexity and memory usage
    - Database query optimization (N+1, indexes)
    - Caching opportunities
    - Resource leaks (memory, connections, goroutines, threads)
    - Concurrency issues (race conditions, deadlocks)

    ## 4. Code Quality & Maintainability
    - SOLID principles adherence
    - Design patterns (appropriate usage)
    - Code smells and anti-patterns
    - Cyclomatic complexity
    - DRY principle (duplication)
    - Single Responsibility Principle
    - Magic numbers and hard-coded values

    ## 5. Readability & Style
    - Naming conventions (clarity, consistency)
    - Function/method length and complexity
    - Code organization and structure
    - Comments quality (when/where/why)
    - Language-specific idioms

    ## 6. Testing
    - Test coverage (unit, integration)
    - Test quality and assertions
    - Missing test scenarios
    - Testability of the code

    ## 7. Error Handling & Resilience
    - Error propagation strategy
    - Graceful degradation
    - Logging and observability
    - Recovery mechanisms

    ## 8. Documentation
    - API documentation completeness
    - Code comments (helpful vs. redundant)
    - README/changelog updates needed

    ## Output Format:
    For each issue found:
    - **Category**: [Functionality/Security/Performance/Quality/etc.]
    - **Severity**: CRITICAL/HIGH/MEDIUM/LOW
    - **Issue**: Clear description of the problem
    - **Impact**: Why this matters
    - **Fix**: Code example showing the correction
    - **Reference**: Link to documentation/best practice (if applicable)

    **Summary**:
    - Overall Quality Score: X/10
    - Priority Fixes: (must address before merge)
    - Nice-to-haves: (future improvements)
    - Positive Feedback: (what's done well)

# ----------------------------------------------------------------------------
# SECURITY FOCUSED REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_security
  title: Security-Focused Code Review
  description: Deep security analysis focusing on vulnerabilities and attack vectors
  tags: [code, review, security, vulnerability]
  system_prompt: |
    You are a security engineer specializing in application security and vulnerability assessment.
    You are expert in {{language}} security best practices and common vulnerability patterns (OWASP Top 10).
  user_prompt: |
    Perform a security-focused code review of the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    **Security Review Checklist**:

    ## 1. Injection Vulnerabilities
    - SQL Injection (parameterized queries?)
    - Command Injection (shell execution safety?)
    - LDAP/XML/NoSQL Injection
    - Template Injection

    ## 2. Authentication & Authorization
    - Authentication bypass possibilities
    - Session management issues
    - Insufficient authorization checks
    - Privilege escalation risks
    - Token/credential handling

    ## 3. Sensitive Data Exposure
    - Secrets in code (API keys, passwords)
    - PII data handling (encryption, masking)
    - Logging sensitive information
    - Insecure data transmission
    - Weak cryptography usage

    ## 4. Input Validation & Sanitization
    - Missing input validation
    - Type confusion vulnerabilities
    - Size/length validation
    - File upload security
    - URL/redirect validation

    ## 5. Cross-Site Scripting (XSS)
    - Reflected XSS
    - Stored XSS
    - DOM-based XSS
    - Output encoding/escaping

    ## 6. Cross-Site Request Forgery (CSRF)
    - CSRF token usage
    - State-changing operations protection

    ## 7. Security Misconfiguration
    - Default credentials
    - Unnecessary features enabled
    - Error message information disclosure
    - Missing security headers

    ## 8. Insecure Dependencies
    - Known vulnerable dependencies
    - Outdated libraries
    - Supply chain risks

    ## 9. Race Conditions & TOCTOU
    - Time-of-check to time-of-use bugs
    - Concurrent access issues

    ## 10. Denial of Service (DoS)
    - Resource exhaustion possibilities
    - Infinite loops/recursion
    - Regex DoS (ReDoS)

    **Output Format**:
    For each vulnerability:
    - **Vulnerability**: Name and CWE ID (if applicable)
    - **Severity**: CRITICAL/HIGH/MEDIUM/LOW (CVSS score if relevant)
    - **Attack Vector**: How this could be exploited
    - **Impact**: Potential damage
    - **Proof of Concept**: Example exploit (if safe to show)
    - **Fix**: Secure code example
    - **Prevention**: How to avoid in future

    **Summary**:
    - Risk Score: X/10
    - Critical Issues: (fix immediately)
    - Security Best Practices: (recommendations)

# ----------------------------------------------------------------------------
# PERFORMANCE FOCUSED REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_performance
  title: Performance-Focused Code Review
  description: Deep performance analysis and optimization recommendations
  tags: [code, review, performance, optimization]
  system_prompt: |
    You are a performance engineer specializing in {{language}} optimization.
    You understand algorithmic complexity, profiling, and system-level performance tuning.
  user_prompt: |
    Perform a performance-focused code review of the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    **Performance Analysis**:

    ## 1. Algorithmic Complexity
    - Time complexity: O(?) analysis for each operation
    - Space complexity: Memory usage patterns
    - Can we do better? Alternative algorithms?
    - Worst-case vs average-case performance

    ## 2. Database & Query Optimization
    - N+1 query problems
    - Missing indexes
    - Query optimization opportunities
    - Batch operations vs individual queries
    - Connection pooling
    - ORM usage efficiency

    ## 3. Memory Management
    - Unnecessary object allocations
    - Memory leaks (unclosed resources)
    - Large object retention
    - Buffer/array sizing
    - String concatenation inefficiencies

    ## 4. Caching Opportunities
    - Repeated computations
    - Cacheable data/results
    - Cache invalidation strategy
    - Memoization possibilities

    ## 5. I/O Operations
    - Synchronous vs asynchronous I/O
    - File I/O optimization
    - Network call efficiency
    - Batch vs streaming

    ## 6. Concurrency & Parallelization
    - Parallelization opportunities
    - Thread pool sizing
    - Lock contention
    - Goroutine/coroutine usage (for Go/Python)
    - Async/await patterns (for JS/Python)

    ## 7. Data Structures
    - Appropriate data structure selection
    - Hash map vs array/list usage
    - Set vs list for lookups
    - Custom data structures needed?

    ## 8. Lazy Loading & Eager Loading
    - Loading strategy appropriateness
    - Pagination opportunities
    - Streaming vs bulk loading

    ## 9. Resource Management
    - Connection pooling
    - File handle management
    - HTTP client reuse
    - Goroutine/thread leaks

    ## 10. Premature Optimization
    - Is optimization needed here?
    - Profile before optimizing
    - Readability vs performance trade-offs

    **Output Format**:
    For each performance issue:
    - **Issue**: Description of bottleneck
    - **Current Complexity**: O(?) time/space
    - **Impact**: Performance degradation (latency/throughput/memory)
    - **Measurement**: How to measure (profiling approach)
    - **Optimization**: Improved code example
    - **Improved Complexity**: O(?) after fix
    - **Trade-offs**: Any downsides to the optimization

    **Summary**:
    - Performance Score: X/10
    - Critical Bottlenecks: (fix first)
    - Quick Wins: (easy optimizations)
    - Profiling Recommendations: (what to measure)

# ----------------------------------------------------------------------------
# BUG DETECTION REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_bugs
  title: Bug Detection Code Review
  description: Systematic bug hunting focusing on common error patterns
  tags: [code, review, bugs, errors]
  system_prompt: |
    You are a senior software engineer with expertise in finding subtle bugs and edge cases.
    You understand common bug patterns in {{language}} and have keen attention to detail.
  user_prompt: |
    Perform a bug-focused code review of the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    **Bug Detection Checklist**:

    ## 1. Logic Errors
    - Incorrect conditional logic
    - Wrong operators (==/= confusion, && vs ||)
    - Inverted logic
    - Missing return statements
    - Unreachable code

    ## 2. Null/Undefined/None Errors
    - Null pointer dereferences
    - Undefined variable access
    - Missing null checks
    - Optional chaining opportunities

    ## 3. Off-by-One Errors
    - Array index boundaries
    - Loop conditions (< vs <=)
    - String slicing errors
    - Fencepost errors

    ## 4. Type Errors
    - Type mismatches
    - Implicit type conversions
    - Integer overflow/underflow
    - Floating-point precision issues
    - String vs number confusion

    ## 5. Concurrency Bugs
    - Race conditions
    - Deadlocks
    - Starvation
    - Lost updates
    - Non-atomic operations
    - Missing synchronization
    - Goroutine/thread leaks

    ## 6. Resource Leaks
    - Unclosed files/connections
    - Memory leaks
    - Unreleased locks
    - Database connection leaks
    - Event listener leaks

    ## 7. Error Handling Bugs
    - Uncaught exceptions
    - Ignored errors
    - Empty catch blocks
    - Wrong error types
    - Error swallowing

    ## 8. Edge Cases
    - Empty input handling
    - Negative numbers
    - Very large numbers
    - Special characters
    - Unicode issues
    - Timezone bugs

    ## 9. State Management Bugs
    - Uninitialized variables
    - State mutation issues
    - Stale state reads
    - Shared mutable state

    ## 10. Async/Concurrency Bugs
    - Missing await/async
    - Promise rejection handling
    - Callback hell
    - Async initialization issues

    **Output Format**:
    For each bug:
    - **Bug Type**: Category of bug
    - **Severity**: CRITICAL/HIGH/MEDIUM/LOW
    - **Description**: What's wrong
    - **Trigger Condition**: How/when it manifests
    - **Impact**: What breaks
    - **Fix**: Corrected code
    - **Test Case**: How to reproduce/test

    **Summary**:
    - Bugs Found: X (Critical: Y, High: Z)
    - Must Fix: (before deployment)
    - Testing Recommendations: (test scenarios to add)

# ----------------------------------------------------------------------------
# CODE QUALITY REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_quality
  title: Code Quality & Maintainability Review
  description: Assess code quality, maintainability, and adherence to clean code principles
  tags: [code, review, quality, maintainability, clean-code]
  system_prompt: |
    You are a software craftsmanship expert specializing in clean code, SOLID principles, and maintainable architecture.
    You're expert in {{language}} best practices and design patterns.
  user_prompt: |
    Perform a code quality review of the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    **Code Quality Assessment**:

    ## 1. SOLID Principles
    - **S**ingle Responsibility: Does each class/function do one thing?
    - **O**pen/Closed: Extensible without modification?
    - **L**iskov Substitution: Proper inheritance/interface usage?
    - **I**nterface Segregation: Focused interfaces?
    - **D**ependency Inversion: Depend on abstractions?

    ## 2. Code Smells
    - Long methods/functions (>20-30 lines?)
    - Large classes (too many responsibilities?)
    - Duplicated code (DRY violations)
    - Magic numbers/strings (need constants?)
    - Feature envy (accessing other objects too much?)
    - Data clumps (repeated parameter groups?)
    - Shotgun surgery (changes require many file edits?)
    - Divergent change (one class changes for many reasons?)

    ## 3. Complexity Metrics
    - Cyclomatic complexity (branching complexity)
    - Nesting depth (too many nested ifs/loops?)
    - Parameter count (too many parameters?)
    - Return statement count

    ## 4. Maintainability
    - Ease of understanding
    - Ease of modification
    - Ease of testing
    - Ease of debugging
    - Coupling and cohesion

    ## 5. Design Patterns
    - Appropriate pattern usage
    - Over-engineering (unnecessary patterns?)
    - Missing patterns (where they'd help?)
    - Pattern misuse

    ## 6. Reusability
    - Code duplication
    - Extract reusable components
    - Generic vs specific implementations
    - Utility function opportunities

    ## 7. Testability
    - Dependency injection
    - Pure functions
    - Side effects isolation
    - Mock-friendly interfaces
    - Test coverage enablers

    ## 8. Documentation Quality
    - Self-documenting code
    - Necessary comments (why, not what)
    - API documentation completeness
    - Complex logic explanations

    **Output Format**:
    For each quality issue:
    - **Issue**: Quality problem identified
    - **Category**: Code smell/SOLID/Pattern/etc.
    - **Impact**: Effect on maintainability
    - **Refactoring**: Improved code example
    - **Pattern**: Recommended pattern (if applicable)

    **Metrics**:
    - Overall Quality Score: X/10
    - Maintainability Index: X/100
    - Complexity Score: X
    - Technical Debt: (estimated effort to fix)

    **Summary**:
    - Immediate Improvements: (quick wins)
    - Refactoring Opportunities: (larger changes)
    - Positive Aspects: (what's good)

