- name: code_review_architecture
  title: Architecture & Design Review
  description: Review architectural decisions, design patterns, and system design
  tags: [code, review, architecture, design, patterns]
  system_prompt: |
    You are a software architect with expertise in system design, design patterns, and architectural patterns.
    You understand {{language}} ecosystem architecture and can evaluate design decisions.
  user_prompt: |
    Perform an architectural review of the following {{language}} code:

    ```{{language}}
    {{code}}
    ```

    **Architecture Review**:

    ## 1. Design Patterns
    - Pattern identification (which patterns used?)
    - Pattern appropriateness
    - Pattern misuse or over-engineering
    - Missing beneficial patterns

    ## 2. Architectural Patterns
    - Layered architecture adherence
    - MVC/MVVM/MVP patterns
    - Microservices patterns
    - Event-driven patterns
    - Domain-Driven Design (DDD)

    ## 3. Separation of Concerns
    - Business logic isolation
    - Presentation layer separation
    - Data access layer organization
    - Cross-cutting concerns handling

    ## 4. Dependency Management
    - Dependency direction (inward?)
    - Circular dependencies
    - Dependency injection usage
    - Interface vs implementation dependency

    ## 5. API Design
    - RESTful principles (if applicable)
    - API consistency
    - Versioning strategy
    - Error response design
    - Input/output contracts

    ## 6. Modularity & Coupling
    - Module boundaries
    - Coupling degree (loose vs tight)
    - Cohesion level
    - Component reusability

    ## 7. Scalability Considerations
    - Horizontal scaling readiness
    - Stateless design
    - Database access patterns
    - Caching strategy
    - Asynchronous processing

    ## 8. Extensibility
    - Plugin architecture
    - Configuration externalization
    - Feature flags usage
    - Strategy pattern for variations

    **Output Format**:
    For each architectural concern:
    - **Concern**: Architecture issue
    - **Impact**: Effect on system qualities (maintainability, scalability, testability)
    - **Alternative**: Better architectural approach
    - **Diagram**: (describe structure if helpful)
    - **Refactoring**: How to improve
    - **Trade-offs**: Pros and cons

    **Summary**:
    - Architecture Score: X/10
    - Major Concerns: (critical architectural issues)
    - Improvement Path: (steps to better architecture)

# ----------------------------------------------------------------------------
# READABILITY & STYLE REVIEWS
# ----------------------------------------------------------------------------

- name: code_review_readability
  title: Readability & Code Style Review
  description: Focus on code clarity, readability, and consistent style
  tags: [code, review, readability, style, clarity]
  system_prompt: |
    You are a code readability expert who understands what makes code easy to understand and maintain.
    You know {{language}} style guides and readability best practices.
  user_prompt: |
    Review the following {{language}} code for readability and style:

    ```{{language}}
    {{code}}
    ```

    **Readability Review**:

    ## 1. Naming Quality
    - Variable names (descriptive?)
    - Function names (clear intent?)
    - Class names (accurate representation?)
    - Avoid abbreviations/acronyms
    - Boolean naming (isActive, hasItems?)
    - Consistent naming patterns

    ## 2. Function/Method Clarity
    - Function length (too long?)
    - Single responsibility
    - Clear purpose
    - Self-documenting
    - Parameter count (too many?)

    ## 3. Code Structure
    - Logical organization
    - Visual grouping
    - Vertical spacing
    - Related code proximity
    - Consistent indentation

    ## 4. Complexity Reduction
    - Nested if statements (flatten?)
    - Early returns vs nested conditions
    - Complex boolean logic (simplify?)
    - Extract method opportunities
    - Guard clauses usage

    ## 5. Comments & Documentation
    - Comment necessity (code should be self-explanatory)
    - Comment quality (explain why, not what)
    - Outdated comments
    - TODO/FIXME markers
    - Complex logic explanations

    ## 6. Magic Values
    - Magic numbers (replace with constants?)
    - Hard-coded strings
    - Unexplained values
    - Configuration externalization

    ## 7. Code Flow
    - Linear flow vs jumping around
    - Predictable execution path
    - Minimal surprises
    - Consistent abstraction level

    ## 8. Formatting Consistency
    - Consistent brace style
    - Import organization
    - Line length adherence
    - Whitespace consistency

    **Output Format**:
    For each readability issue:
    - **Issue**: What makes it hard to read
    - **Cognitive Load**: How it affects understanding
    - **Improvement**: More readable version
    - **Rationale**: Why it's better

    **Summary**:
    - Readability Score: X/10
    - Quick Wins: (easy improvements)
    - Clarity Issues: (confusing sections)

