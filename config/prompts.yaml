      Please recommend the best {{language}} framework for {{function}} with {{feature}} capabilities.

      Evaluation Criteria (4L Principle):
      1. **Lots of users**: Large community and adoption
      2. **Lots of learning materials**: Documentation, tutorials, courses
      3. **Lots of successful cases**: Production usage, case studies
      4. **License is free**: Open source, permissive license

      ## 1. Recommended Framework: [Framework Name]

      ### Overview
      - What it is and who maintains it
      - Current version and maturity
      - License type
      - GitHub stars and contributors

      ### Why This Framework?
      - Strengths for your use case
      - Community size and activity
      - Enterprise adoption
      - Learning curve

      ## 2. Framework Comparison

      Create comparison table:

      | Framework | Pros | Cons | Community Size | Learning Resources | Use Cases | License |
      |-----------|------|------|----------------|-------------------|-----------|---------|
      | Framework A | ... | ... | ... | ... | ... | ... |
      | Framework B | ... | ... | ... | ... | ... | ... |
      | Framework C | ... | ... | ... | ... | ... | ... |

      ## 3. Detailed Analysis of Top Choice

      ### Technical Features
      - Core features
      - Performance characteristics
      - Scalability
      - Integration ecosystem

      ### Community & Support
      - Community size
      - Active maintainers
      - Issue response time
      - Commercial support availability

      ### Learning Resources
      - Official documentation quality
      - Tutorial availability
      - Books and courses
      - Video content
      - Code examples and templates

      ### Production Readiness
      - Companies using it in production
      - Success stories and case studies
      - Stability and reliability
      - Security track record

      ### Migration & Integration
      - Migration path from other frameworks
      - Integration with existing tools
      - Ecosystem compatibility

      ## 4. Getting Started Guide
      - Installation instructions
      - "Hello World" example
      - Project structure best practices
      - Configuration tips

      ## 5. When NOT to Use This Framework
      - Scenarios where alternatives are better
      - Known limitations
      - Trade-offs to consider

      ## 6. Alternative Frameworks
      For each alternative:
      - Name and brief description
      - When to consider it instead
      - Key differentiators

      ## 7. Learning Path
      - Beginner resources
      - Intermediate tutorials
      - Advanced topics
      - Best practices guides

      Provide data-driven recommendations with statistics where possible.
    tags: design, frameworks, recommendations

