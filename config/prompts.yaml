      ### Story 1: [Story Title]
      **As a** {{userRole}}
      **I want** [goal]
      **So that** [business value]

      **Acceptance Criteria:**
      - [ ] Criterion 1 (Given-When-Then format)
      - [ ] Criterion 2
      - [ ] Criterion 3

      **Definition of Done:**
      - [ ] Code implemented and reviewed
      - [ ] Unit tests written (>80% coverage)
      - [ ] Integration tests added
      - [ ] Documentation updated
      - [ ] Accepted by Product Owner

