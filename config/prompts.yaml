  write_go_unit_test:
    description: Write Go unit tests with best practices
    system_prompt: You are an expert Go developer specializing in testing, mocking, and Go best practices.
    user_prompt: |
      You are tasked with generating comprehensive, production-quality unit tests for Go code.

      **Testing Requirements:**

      1. **Test Framework & Tools**
         - Use standard `testing` package
         - Include `testify/assert` for readable assertions
         - Use `testify/mock` for mocking when needed
         - Add `github.com/stretchr/testify/suite` for test suites when appropriate

      2. **Test Structure**
         - File naming: `<filename>_test.go`
         - Function naming: `TestFunctionName` for unit tests
         - Benchmark naming: `BenchmarkFunctionName` for benchmarks
         - Example naming: `ExampleFunctionName` for examples

      3. **Test Coverage**
         - Success cases with typical inputs
         - Edge cases (empty, nil, boundary values)
         - Error cases and error handling
         - Concurrent scenarios (if applicable)
         - Context cancellation (if using context)

      4. **Table-Driven Tests**
         - Use table-driven approach for multiple scenarios
         - Structure: `tests := []struct{ name, input, want, wantErr }`
         - Use `t.Run(tt.name, func(t *testing.T) {})` for subtests

      5. **Mocking Strategy**
         - Interface-based mocking for dependencies
         - Mock external services, databases, APIs
         - Use dependency injection
         - Verify mock expectations

      6. **Best Practices**
         - Tests should be deterministic
         - No external dependencies (network, file system, databases)
         - Use test fixtures and builders
         - Clean setup and teardown
         - Clear, descriptive test names
         - Use `t.Helper()` for test helper functions
         - Add comments for complex test scenarios

      7. **Special Considerations**
         - For goroutines: use sync.WaitGroup, channels, or time.After for coordination
         - For race conditions: ensure tests can run with `-race` flag
         - For HTTP handlers: use `httptest.NewRecorder` and `httptest.NewRequest`
         - For time-dependent code: allow time to be injectable/mockable

      8. **Coverage Goals**
         - Aim for >80% code coverage
         - Focus on critical paths and business logic
         - Don't test trivial getters/setters
         - Ensure error paths are tested

      **Go Code to Test:**
      ```go
      {{code}}
      ```

      Please generate:
      1. Complete test file with package declaration and imports
      2. All necessary mocks and test helpers
      3. Table-driven tests for main functions
      4. Edge case and error scenario tests
      5. Example functions if the API is public
      6. Benchmarks for performance-critical code
      7. Test helper functions with `t.Helper()`
    tags: test, go, unit-test

  write_java_unit_test:
    description: Write Java unit tests with Spring Boot support
    system_prompt: You are an expert Java developer specializing in testing with JUnit 5, Mockito, Spring Boot Test, and testing best practices.
    user_prompt: |
      Generate production-quality unit tests for the following Java code.

      **Testing Stack:**
      - JUnit 5 (Jupiter)
      - Mockito for mocking
      - AssertJ for fluent assertions
      - Spring Boot Test (if Spring components)
      - MockMvc for controllers

      **Test Requirements:**

      1. **Test Structure**
         - Use `@ExtendWith(MockitoExtension.class)` or `@SpringBootTest`
         - Clear test method naming: `should_ExpectedBehavior_When_Condition()`
         - Organize with `@Nested` classes for related tests

      2. **Mocking Strategy**
         - Use `@Mock` for dependencies
         - Use `@InjectMocks` for class under test
         - Use `@MockBean` for Spring beans
         - Verify interactions with `verify()`

      3. **Test Coverage**
         - Happy path scenarios
         - Error conditions and exceptions
         - Boundary values and edge cases
         - Null handling
         - Validation scenarios

      4. **For Service Classes:**
         - Mock all dependencies
         - Test business logic thoroughly
         - Verify repository/DAO calls
         - Test transaction boundaries
         - Test exception handling

      5. **For Controllers:**
         - Use `@WebMvcTest` for focused tests
         - Use `MockMvc` for endpoint testing
         - Test request mapping
         - Test request/response serialization
         - Test validation
         - Test error responses

      6. **For Repositories:**
         - Use `@DataJpaTest` with H2/TestContainers
         - Test custom queries
         - Test relationships and cascading
         - Verify transaction behavior

      7. **Best Practices:**
         - Follow AAA pattern (Arrange-Act-Assert)
         - Use Given-When-Then in BDD style
         - One assertion per test (when possible)
         - Use `@BeforeEach` for setup
         - Use `@ParameterizedTest` for multiple inputs
         - Clear, descriptive test names

      **Java Code:**
      ```java
      {{code}}
      ```

      Generate:
      1. Complete test class with annotations
      2. Setup and teardown methods
      3. Comprehensive test methods
      4. Mock configurations
      5. Test data builders/fixtures
      6. Helper methods for common operations
    tags: test, java, unit-test, spring

