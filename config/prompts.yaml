prompts:
  # === DESIGN & ARCHITECTURE ===

  design_system_architecture:
    title: Design System Architecture
    description: Design system architecture with diagrams
    system_prompt: You are a senior software architect with 15+ years of experience in designing scalable, maintainable systems.
    user_prompt: |
      Please design a comprehensive system architecture for {{system}} to solve {{problem}}.

      Requirements:
      - Technology stack: {{technologies}}
      - Expected scale: {{scale}}
      - Key non-functional requirements: {{nfr}}

      Please provide:
      1. High-level architecture diagram (C4 Context/Container level)
      2. Component breakdown with responsibilities
      3. Data flow and integration points
      4. Technology choices and rationale
      5. Scalability and performance considerations
      6. Security architecture
      7. Deployment strategy
      8. Monitoring and observability approach

      Include PlantUML diagrams for:
      - System context diagram
      - Component diagram
      - Sequence diagram for key workflows
    arguments:
      - name: system
        description: The system name or type to design architecture for
        required: true
      - name: problem
        description: The problem this system aims to solve
        required: true
      - name: technologies
        description: Technology stack to use (e.g., "Go, PostgreSQL, Redis, Kubernetes")
        required: true
      - name: scale
        description: Expected scale (e.g., "10K users", "1M requests/day")
        required: true
      - name: nfr
        description: Key non-functional requirements (e.g., "HA, 99.9% uptime, <100ms latency")
        required: true
    tags: design, architecture

  design_api:
    title: Design RESTful/GraphQL API
    description: Design RESTful/GraphQL API
    system_prompt: You are an API design expert specializing in RESTful and GraphQL APIs following industry best practices.
    user_prompt: |
      Please design a {{api_type}} API for {{domain}} with the following requirements:

      Functional Requirements:
      {{requirements}}

      Please provide:
      1. API endpoint design (REST) or Schema design (GraphQL)
      2. Request/Response data models
      3. Authentication and authorization strategy
      4. Error handling and status codes
      5. Versioning strategy
      6. Rate limiting and pagination approach
      7. API documentation (OpenAPI/Swagger format)
      8. Example requests and responses

      Follow best practices for:
      - Resource naming and URL structure
      - HTTP methods and status codes
      - Idempotency and safety
      - HATEOAS principles (for REST)
      - Filtering, sorting, and pagination
    arguments:
      - name: api_type
        description: API type (e.g., "REST", "GraphQL", "gRPC")
        required: true
      - name: domain
        description: The domain or business area for this API (e.g., "e-commerce", "social media")
        required: true
      - name: requirements
        description: Functional requirements for the API
        required: true
    tags: design, api

  design_database_schema:
    title: Design Database Schema
    description: Design database schema with optimization
    system_prompt: You are a database architect expert in relational and NoSQL database design, normalization, and optimization.
    user_prompt: |
      Please design a database schema for {{application}} using {{database_type}}.

      Requirements:
      {{requirements}}

      Please provide:
      1. Entity-Relationship Diagram (ERD)
      2. Table definitions with columns, data types, and constraints
      3. Indexes strategy for performance
      4. Relationships and foreign keys
      5. Normalization level and justification
      6. Query optimization recommendations
      7. Sharding/partitioning strategy (if applicable)
      8. Migration scripts

      Consider:
      - Data integrity and consistency
      - Query performance
      - Scalability
    arguments:
      - name: application
        description: The application or system this database supports
        required: true
      - name: database_type
        description: Database type (e.g., "PostgreSQL", "MongoDB", "Cassandra")
        required: true
      - name: requirements
        description: Data requirements and use cases
        required: true
    tags: design, database

  design_microservices:
    description: Design microservices architecture
    system_prompt: You are a microservices architecture expert with deep knowledge of distributed systems, domain-driven design, and service mesh patterns.
    user_prompt: |
      Please design a microservices architecture for {{application}}.

      Domain: {{domain}}
      Business capabilities: {{capabilities}}

      Please provide:
      1. Service decomposition strategy (bounded contexts)
      2. Service interaction patterns (sync/async)
      3. Data management strategy (database per service, saga pattern)
      4. API Gateway and service discovery
      5. Inter-service communication (REST, gRPC, message queues)
      6. Distributed transaction handling
      7. Monitoring and distributed tracing
      8. Deployment and orchestration (Kubernetes)
      9. Failure handling and resilience patterns

      Include diagrams showing:
      - Service boundaries and responsibilities
      - Communication patterns
      - Data flow
    tags: design, microservices

  # === CODE GENERATION & IMPROVEMENT ===

  generate_boilerplate:
    description: Generate project boilerplate code
    system_prompt: You are an expert in {{language}} and modern development practices.
    user_prompt: |
      Please generate a complete project boilerplate for a {{project_type}} using {{language}} and {{framework}}.

      Include:
      1. Project structure with folders and files
      2. Configuration files (package.json, pom.xml, go.mod, etc.)
      3. Main application entry point
      4. Example module/component with best practices
      5. Testing setup with example test
      6. Logging and error handling utilities
      7. Environment configuration management
      8. Build and deployment scripts
      9. Docker configuration
      10. README with setup instructions

      Follow best practices for:
      - Code organization and modularity
      - Dependency injection
      - Configuration management
      - Logging and monitoring
    tags: code, generate

  implement_design_pattern:
    description: Implement design pattern with explanation
    system_prompt: You are a software design patterns expert with deep understanding of Gang of Four patterns and modern architectural patterns.
    user_prompt: |
      Please implement the {{pattern}} design pattern in {{language}} for the following use case:

      {{use_case}}

      Provide:
      1. Complete code implementation
      2. UML class diagram showing pattern structure
      3. Explanation of how the pattern solves the problem
      4. Real-world usage examples
      5. Pros and cons of using this pattern
      6. Alternative patterns to consider
      7. Unit tests demonstrating the pattern
      8. Performance and scalability considerations
    tags: code, design-patterns

  refactor_to_solid:
    description: Refactor code to follow SOLID principles
    system_prompt: You are a code quality expert specializing in SOLID principles and clean code practices.
    user_prompt: |
      Please refactor the following {{language}} code to strictly follow SOLID principles:

      ```
      {{code}}
      ```

      For each SOLID principle, explain:
      1. Single Responsibility Principle - How classes were split
      2. Open/Closed Principle - How extensibility was improved
      3. Liskov Substitution Principle - How inheritance was fixed
      4. Interface Segregation Principle - How interfaces were refined
      5. Dependency Inversion Principle - How dependencies were inverted

      Provide:
      - Refactored code with clear comments
      - Before/After comparison
      - UML diagrams showing the improved structure
      - Explanation of each refactoring decision
    tags: code, refactor, solid

  add_error_handling:
    description: Add comprehensive error handling
    system_prompt: You are an expert in error handling, resilience patterns, and defensive programming.
    user_prompt: |
      Please add comprehensive error handling to the following {{language}} code:

      ```
      {{code}}
      ```

      Implement:
      1. Try-catch/error handling at appropriate levels
      2. Custom error types for specific failure scenarios
      3. Error context and stack traces
      4. Retry logic with exponential backoff
      5. Circuit breaker pattern (if external calls)
      6. Graceful degradation
      7. Proper logging with error details
      8. User-friendly error messages
      9. Recovery strategies

      Ensure code is production-ready with proper error handling.
    tags: code, error-handling, resilience

  add_observability:
    description: Add logging, metrics, and tracing
    system_prompt: You are an observability expert specializing in structured logging, metrics, distributed tracing, and APM.
    user_prompt: |
      Please add comprehensive observability to the following {{language}} code for {{component}}:

      ```
      {{code}}
      ```

      Implement:
      1. Structured logging (JSON format) with log levels
      2. Key metrics (counters, gauges, histograms, timers)
      3. Distributed tracing with spans and trace IDs
      4. Performance instrumentation
      5. Error tracking and monitoring
      6. Business metrics where applicable
      7. Health check endpoints
      8. Debug logging for troubleshooting

      Use appropriate libraries for {{language}}:
      - Logging: (suggest framework)
      - Metrics: (suggest framework)
      - Tracing: (suggest framework)

      Provide dashboard queries for common scenarios.
    tags: code, observability, monitoring

  # === CODE REVIEW & QUALITY ===

  code_review:
    title: Request Code Review
    description: Asks the LLM to analyze code quality and suggest improvements
    system_prompt: You are an experienced code reviewer with expertise in software engineering best practices.
    user_prompt: |
      Please review the following code and provide feedback:

      ```
      {{code}}
      ```

      Focus on:
      - Code quality and readability
      - Potential bugs or issues
      - Best practices and improvements
      - Performance considerations

      Provide specific, actionable suggestions for improvement.
    arguments:
      - name: code
        description: The code to review
        required: true
    tags: review, code, quality

  comprehensive_code_review:
    title: Comprehensive Code Review
    description: Perform multi-aspect comprehensive code review
    system_prompt: You are a principal engineer conducting a thorough code review with expertise in security, performance, maintainability, and best practices.
    user_prompt: |
      Please perform a comprehensive code review of the following {{language}} code:

      ```
      {{code}}
      ```

      Review across multiple dimensions:

      ## 1. Functionality & Correctness
      - Logic errors and edge cases
      - Null/undefined handling
      - Boundary conditions
      - Data validation

      ## 2. Security
      - Input validation and sanitization
      - SQL injection, XSS, CSRF vulnerabilities
      - Authentication and authorization
      - Sensitive data handling
      - Dependency vulnerabilities

      ## 3. Performance
      - Time/space complexity analysis
      - Database query optimization
      - Caching opportunities
      - Memory leaks
      - Concurrency issues

      ## 4. Code Quality
      - SOLID principles adherence
      - Design patterns usage
      - Code smells and anti-patterns
      - Readability and maintainability
      - Test coverage

      ## 5. Best Practices
      - Language-specific idioms
      - Error handling
      - Logging and monitoring
      - Documentation

      For each issue found, provide:
      - Severity (Critical/High/Medium/Low)
      - Explanation
      - Code example of the fix
      - Learning resources

      Provide an overall quality score (0-10) and priority recommendations.
    arguments:
      - name: code
        description: The code to review
        required: true
      - name: language
        description: Programming language of the code
        required: true
    tags: review, quality, security

  # === TESTING ===

  write_integration_tests:
    description: Write integration tests
    system_prompt: You are a testing expert specializing in integration testing strategies and test automation.
    user_prompt: |
      Please write comprehensive integration tests for the following {{language}} {{component}}:

      ```
      {{code}}
      ```

      Requirements:
      - Test framework: {{test_framework}}
      - Integration points: {{integrations}}

      Create tests that:
      1. Test API endpoints end-to-end
      2. Test database integration with test containers
      3. Test external service integration (with mocking)
      4. Test async/event-driven flows
      5. Test error scenarios and retries
      6. Test data consistency across services
      7. Setup and teardown procedures
      8. Test data builders/factories

      Use best practices:
      - Arrange-Act-Assert pattern
      - Test isolation and independence
      - Meaningful test names
      - Proper assertions
      - Test containers for databases
      - WireMock for external APIs
    tags: test, integration

  write_e2e_tests:
    description: Write end-to-end tests
    system_prompt: You are an E2E testing expert with experience in Selenium, Cypress, Playwright, and test automation frameworks.
    user_prompt: |
      Please write end-to-end tests for the following user journey in {{application}}:

      User Story:
      {{user_story}}

      Test Scenarios:
      {{scenarios}}

      Create E2E tests using {{framework}} that:
      1. Test complete user workflows
      2. Test UI interactions and validations
      3. Test data flow across multiple pages
      4. Test positive and negative scenarios
      5. Handle async operations and waiting
      6. Take screenshots on failures
      7. Generate test reports
      8. Support parallel execution

      Include:
      - Page Object Model (POM) implementation
      - Reusable test utilities
      - Test data management
      - CI/CD integration configuration
    tags: test, e2e

  write_performance_tests:
    description: Write performance and load tests
    system_prompt: You are a performance testing expert with experience in load testing, stress testing, and performance optimization.
    user_prompt: |
      Please write performance tests for {{component}} handling {{expected_load}}.

      System under test:
      {{system_description}}

      Create performance tests using {{tool}} (JMeter, K6, Gatling, Locust) that:
      1. Simulate realistic user load patterns
      2. Test various load scenarios:
         - Normal load
         - Peak load
         - Stress testing (breaking point)
         - Spike testing
         - Endurance testing
      3. Measure key metrics:
         - Response time (p50, p95, p99)
         - Throughput (requests/sec)
         - Error rate
         - Resource utilization
      4. Include ramp-up and ramp-down phases
      5. Generate performance reports
      6. Define SLAs and assertions
      7. Provide CI/CD integration

      Also provide:
      - Performance baseline
      - Bottleneck analysis approach
      - Optimization recommendations
    tags: test, performance

  generate_test_data:
    description: Generate realistic test data
    system_prompt: You are a test data management expert who creates realistic, comprehensive test data for various testing scenarios.
    user_prompt: |
      Please generate realistic test data for {{entity}} in {{domain}}.

      Data requirements:
      {{requirements}}

      Generate:
      1. Test data factories/builders in {{language}}
      2. Valid test data covering:
         - Happy path scenarios
         - Edge cases
         - Boundary values
      3. Invalid test data for negative testing
      4. Bulk test data for performance testing
      5. SQL/NoSQL seed data scripts
      6. API payload examples
      7. CSV/JSON data files

      Ensure data:
      - Follows domain constraints
      - Represents realistic scenarios
      - Covers all edge cases
      - Is privacy-compliant (no real PII)
      - Supports data-driven testing
    tags: test, test-data

  # === DEBUGGING & TROUBLESHOOTING ===

  debug_production_issue:
    description: Debug production issue systematically
    system_prompt: You are a senior SRE and debugging expert with deep knowledge of production troubleshooting, log analysis, and root cause analysis.
    user_prompt: |
      Please help debug the following production issue:

      **Symptoms:**
      {{symptoms}}

      **Error Messages:**
      {{error_messages}}

      **Relevant Logs:**
      {{logs}}

      **System Context:**
      - Application: {{application}}
      - Environment: {{environment}}
      - Recent changes: {{changes}}

      Provide a systematic debugging approach:

      ## 1. Problem Analysis
      - Symptom analysis
      - Error pattern identification
      - Impact assessment

      ## 2. Hypothesis Generation
      - List 5-7 possible root causes ranked by likelihood
      - For each hypothesis, explain the reasoning

      ## 3. Investigation Steps
      - Specific commands to run
      - Logs to check
      - Metrics to analyze
      - Tests to perform

      ## 4. Root Cause Analysis
      - Most likely root cause
      - Supporting evidence
      - Why other hypotheses were ruled out

      ## 5. Resolution
      - Immediate fix (hotfix if needed)
      - Long-term solution
      - Prevention measures

      ## 6. Follow-up
      - Monitoring to add
      - Tests to implement
      - Documentation to update
    tags: debug, troubleshoot, production

  analyze_performance_issue:
    description: Analyze and fix performance bottlenecks
    system_prompt: You are a performance optimization expert with expertise in profiling, benchmarking, and performance tuning across different technology stacks.
    user_prompt: |
      Please analyze the following performance issue:

      **Problem:**
      {{problem}}

      **Performance Metrics:**
      {{metrics}}

      **Code:**
      ```
      {{code}}
      ```

      Perform analysis:

      ## 1. Performance Profiling
      - Identify bottlenecks (CPU, memory, I/O, network)
      - Analyze algorithm complexity
      - Review database queries
      - Check resource utilization

      ## 2. Root Cause Identification
      - Primary bottleneck
      - Contributing factors
      - Quantify impact

      ## 3. Optimization Recommendations
      Priority-ranked optimizations with:
      - Specific code changes
      - Expected improvement
      - Implementation complexity
      - Risk assessment

      ## 4. Optimized Code
      - Refactored code with improvements
      - Before/After performance comparison
      - Benchmark results

      ## 5. Long-term Improvements
      - Architecture changes to consider
      - Caching strategies
      - Scaling options
      - Monitoring recommendations
    tags: debug, performance, optimization

  # === DOCUMENTATION ===

  write_technical_doc:
    description: Write comprehensive technical documentation
    system_prompt: You are a technical documentation expert who creates clear, comprehensive documentation for technical audiences.
    user_prompt: |
      Please create comprehensive technical documentation for {{component}}.

      **Component Description:**
      {{description}}

      **Code:**
      ```
      {{code}}
      ```

      Create documentation with:

      ## 1. Overview
      - Purpose and scope
      - Key features
      - Architecture overview

      ## 2. Getting Started
      - Prerequisites
      - Installation
      - Quick start example
      - Configuration

      ## 3. Architecture & Design
      - Component diagram
      - Data flow
      - Key design decisions
      - Integration points

      ## 4. API Reference
      - All public APIs/methods
      - Parameters and return types
      - Code examples
      - Error codes

      ## 5. Usage Guide
      - Common use cases
      - Best practices
      - Code examples
      - Configuration options

      ## 6. Operations Guide
      - Deployment
      - Monitoring
      - Troubleshooting
      - Performance tuning

      ## 7. Development Guide
      - Development setup
      - Build process
      - Testing
      - Contributing guidelines

      Use clear language, diagrams, and plenty of code examples.
    tags: documentation, technical-writing

  # === DEVOPS & CI/CD ===

  setup_cicd_pipeline:
    description: Setup CI/CD pipeline
    system_prompt: You are a DevOps expert specializing in CI/CD, automation, and modern deployment practices.
    user_prompt: |
      Please create a complete CI/CD pipeline for {{application}} using {{ci_tool}}.

      **Tech Stack:**
      {{tech_stack}}

      **Deployment Target:**
      {{deployment_target}}

      Create pipeline configuration that includes:

      ## 1. Build Stage
      - Checkout code
      - Install dependencies
      - Compile/build application
      - Run static code analysis
      - Security scanning

      ## 2. Test Stage
      - Unit tests
      - Integration tests
      - Code coverage reports
      - Test result publishing

      ## 3. Package Stage
      - Build Docker image
      - Tag with version
      - Security scanning
      - Push to registry

      ## 4. Deploy Stage
      - Deploy to staging
      - Smoke tests
      - Deploy to production (with approval)
      - Health checks
      - Rollback mechanism

      ## 5. Post-Deployment
      - Monitoring integration
      - Notification setup
      - Deployment metrics

      Include:
      - Pipeline configuration file
      - Docker files
      - Kubernetes manifests (if applicable)
      - Scripts for automation
      - Documentation
    tags: devops, cicd, automation

  setup_monitoring:
    description: Setup comprehensive monitoring and alerting
    system_prompt: You are a Site Reliability Engineer expert in observability, monitoring, and incident management.
    user_prompt: |
      Please setup comprehensive monitoring for {{application}}.

      **System Description:**
      {{description}}

      **SLOs:**
      {{slos}}

      Create monitoring setup including:

      ## 1. Metrics Collection
      - Application metrics (RED method)
        - Request rate
        - Error rate
        - Duration (latency)
      - System metrics (USE method)
        - Utilization
        - Saturation
        - Errors
      - Business metrics

      ## 2. Logging
      - Structured logging setup
      - Log aggregation configuration
      - Log retention policy
      - Search and analysis queries

      ## 3. Tracing
      - Distributed tracing setup
      - Trace sampling strategy
      - Trace analysis queries

      ## 4. Alerting
      - SLO-based alerts
      - Error budget alerts
      - Threshold-based alerts
      - Alert routing and escalation

      ## 5. Dashboards
      - Service health dashboard
      - SLO dashboard
      - Troubleshooting dashboard
      - Business metrics dashboard

      ## 6. Runbooks
      - Common issues and resolutions
      - Escalation procedures
      - On-call playbook

      Provide configurations for:
      - Prometheus/Grafana
      - ELK/EFK stack
      - Jaeger/Zipkin
      - PagerDuty/Opsgenie
    tags: devops, monitoring, sre

  # === SECURITY ===

  security_audit:
    description: Perform comprehensive security audit
    system_prompt: You are a security expert specializing in application security, penetration testing, and secure code review.
    user_prompt: |
      Please perform a comprehensive security audit of the following code:

      ```
      {{code}}
      ```

      **Application Context:**
      {{context}}

      Audit for:

      ## 1. OWASP Top 10 Vulnerabilities
      - Injection (SQL, NoSQL, OS, LDAP)
      - Broken Authentication
      - Sensitive Data Exposure
      - XML External Entities (XXE)
      - Broken Access Control
      - Security Misconfiguration
      - Cross-Site Scripting (XSS)
      - Insecure Deserialization
      - Using Components with Known Vulnerabilities
      - Insufficient Logging & Monitoring

      ## 2. Security Best Practices
      - Input validation and sanitization
      - Output encoding
      - Authentication mechanisms
      - Authorization checks
      - Session management
      - Cryptography usage
      - Error handling
      - Secure configuration

      ## 3. Infrastructure Security
      - API security
      - Database security
      - Network security
      - Container security

      For each issue found:
      - Severity rating (Critical/High/Medium/Low)
      - Exploit scenario
      - Impact assessment
      - Remediation code
      - Testing approach

      Provide:
      - Executive summary
      - Detailed findings
      - Remediation plan
      - Security checklist
    tags: security, audit, owasp

  implement_auth:
    description: Implement secure authentication and authorization
    system_prompt: You are a security expert specializing in authentication, authorization, and identity management.
    user_prompt: |
      Please implement secure authentication and authorization for {{application}} using {{auth_method}}.

      **Requirements:**
      {{requirements}}

      Implement:

      ## 1. Authentication
      - User registration with validation
      - Login with password hashing (bcrypt/Argon2)
      - JWT/Session token management
      - Token refresh mechanism
      - Multi-factor authentication (optional)
      - Password reset flow
      - Account lockout after failed attempts

      ## 2. Authorization
      - Role-based access control (RBAC)
      - Permission system
      - Resource-level authorization
      - API endpoint protection
      - Admin vs. user roles

      ## 3. Security Features
      - CSRF protection
      - XSS prevention
      - Rate limiting
      - Secure session management
      - Secure cookie configuration
      - Input validation and sanitization

      ## 4. Best Practices
      - Password strength requirements
      - Secure password storage
      - Audit logging
      - Security headers
      - HTTPS enforcement

      Provide:
      - Complete implementation code
      - Database schema
      - API endpoints
      - Test cases
      - Security checklist
    tags: security, authentication, authorization

  # === MIGRATION & MODERNIZATION ===

  migrate_to_microservices:
    description: Migrate monolith to microservices
    system_prompt: You are a software architect expert in microservices migration, domain-driven design, and gradual migration strategies.
    user_prompt: |
      Please create a migration plan to move {{monolith}} from monolithic architecture to microservices.

      **Current System:**
      {{current_system}}

      **Business Domains:**
      {{domains}}

      Create a migration strategy:

      ## 1. Assessment
      - Current architecture analysis
      - Identify bounded contexts
      - Define service boundaries
      - Dependency mapping

      ## 2. Migration Strategy
      - Strangler pattern approach
      - Service extraction order (priority)
      - Data migration strategy
      - API versioning strategy

      ## 3. Service Decomposition
      For each microservice:
      - Service responsibilities
      - API contracts
      - Data ownership
      - Dependencies

      ## 4. Implementation Phases
      - Phase 1: Extract first service (low-risk)
      - Phase 2: Core services
      - Phase 3: Remaining services
      - Phase 4: Decommission monolith

      ## 5. Technical Approach
      - API Gateway pattern
      - Service mesh (if needed)
      - Inter-service communication
      - Distributed transaction handling
      - Monitoring and observability

      ## 6. Risk Mitigation
      - Rollback strategies
      - Feature flags
      - Parallel run periods
      - Testing strategy

      Provide:
      - Migration roadmap with timeline
      - Effort estimates
      - Risk assessment
      - Success metrics
    tags: architecture, migration, microservices

  upgrade_dependencies:
    description: Upgrade dependencies safely
    system_prompt: You are a software maintenance expert specializing in dependency management, version upgrades, and breaking change migration.
    user_prompt: |
      Please create a plan to upgrade {{package}} from version {{old_version}} to {{new_version}}.

      **Current Code:**
      ```
      {{code}}
      ```

      Create upgrade plan:

      ## 1. Impact Analysis
      - Breaking changes review
      - Affected code areas
      - Dependency conflicts
      - Risk assessment

      ## 2. Migration Steps
      - Pre-upgrade checklist
      - Step-by-step upgrade procedure
      - Code changes required
      - Configuration changes
      - Database migrations (if any)

      ## 3. Code Updates
      - Updated code with changes
      - API changes handled
      - Deprecated API replacements
      - New features adoption

      ## 4. Testing Strategy
      - Unit test updates
      - Integration test updates
      - Regression testing plan
      - Performance testing

      ## 5. Deployment Plan
      - Staging deployment
      - Canary deployment
      - Rollback plan
      - Monitoring plan

      ## 6. Documentation
      - Change log
      - Updated documentation
      - Team communication

      Provide:
      - Complete migration code
      - Test coverage
      - Rollback procedure
    tags: maintenance, upgrade, dependencies

  # === DATABASE ===

  optimize_database_queries:
    description: Optimize slow database queries
    system_prompt: You are a database optimization expert with deep knowledge of query optimization, indexing strategies, and database performance tuning.
    user_prompt: |
      Please optimize the following slow database queries:

      **Database:** {{database_type}}

      **Slow Queries:**
      ```sql
      {{queries}}
      ```

      **Execution Plans:**
      {{execution_plans}}

      Provide optimization:

      ## 1. Query Analysis
      - Execution plan interpretation
      - Identify bottlenecks (table scans, missing indexes, etc.)
      - Query complexity analysis

      ## 2. Index Recommendations
      - Missing indexes to create
      - Index type (B-tree, hash, full-text, etc.)
      - Composite indexes
      - Index maintenance considerations

      ## 3. Query Optimization
      - Rewritten queries with improvements
      - JOIN optimization
      - Subquery optimization
      - Use of CTEs where appropriate
      - Pagination improvements

      ## 4. Schema Improvements
      - Table structure optimization
      - Normalization/denormalization suggestions
      - Partitioning strategy

      ## 5. Application-Level Optimization
      - Caching strategy
      - N+1 query elimination
      - Batch operations
      - Read replicas usage

      ## 6. Monitoring
      - Queries to monitor
      - Metrics to track
      - Alert thresholds

      Provide:
      - Optimized queries
      - Index creation scripts
      - Performance comparison (before/after)
      - Implementation guide
    tags: database, optimization, performance

  # === AI/ML Related ===

  implement_feature_extraction:
    description: Implement feature extraction for ML
