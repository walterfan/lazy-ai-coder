  update_code_comments:
    description: Improve and update code comments systematically
    system_prompt: You are a code documentation expert who improves code readability through clear, comprehensive comments.
    user_prompt: |
      Please update and improve the comments in the following {{language}} code:

      ```
      {{code}}
      ```

      **Comment Improvement Guidelines:**

      ## 1. File-Level Documentation
      - File purpose and overview
      - Module/package description
      - Author and version information
      - Copyright and license
      - Dependencies and requirements

      ## 2. Class/Struct Documentation
      - Class purpose and responsibility
      - Design pattern used (if applicable)
      - Usage examples
      - Important notes and caveats
      - Relationships with other classes

      ## 3. Function/Method Documentation
      For each function:
      - Brief description (one line)
      - Detailed description (if complex)
      - Parameters with types and descriptions
      - Return value with type and description
      - Exceptions/errors that can be raised
      - Side effects
      - Example usage
      - Time/space complexity (for algorithms)
      - Thread safety information

      ## 4. Inline Comments
      - Explain WHY, not WHAT (code shows what)
      - Document non-obvious logic
      - Explain complex algorithms
      - Highlight edge cases handled
      - Warn about potential pitfalls
      - Explain magic numbers with named constants

      ## 5. TODO Comments
      - Add TODO for known issues
      - Include ticket/issue numbers
      - Describe what needs to be done
      - Estimate effort level

      ## 6. Code Examples in Comments
      For public APIs, include usage examples:
      ```{{language}}
      /**
       * Example usage:
       * @example
       * const result = myFunction(param1, param2);
       * console.log(result);
       */
      ```

      ## 7. Remove or Update
      - Remove outdated comments
      - Remove obvious comments
      - Remove commented-out code (use version control)
      - Update comments that don't match current code

      ## 8. Follow Language Conventions
      - Use language-specific documentation style
      - Follow team/project conventions
      - Use consistent formatting
      - Proper grammar and spelling

      ## 9. Special Annotations
      - @deprecated for deprecated code
      - @see for related methods
      - @since for versioning
      - @throws for exceptions
      - @param for parameters
      - @return for return values

      Provide the updated code with improved comments while maintaining all functionality.
    tags: tools, documentation, comments

